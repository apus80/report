<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InvestFlow AI Market Dashboard</title>

<style>

:root{
--bg-dark:#0f172a;
--card-bg:#1e293b;
--primary:#38bdf8;
--up:#f87171;
--down:#60a5fa;
--text:#f8fafc;
--status-dim:#64748b;
}

body{
font-family:'Segoe UI',Arial;
background:var(--bg-dark);
color:var(--text);
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
color:var(--primary);
font-weight:800;
letter-spacing:2px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
}

.card{
background:var(--card-bg);
padding:20px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.5);
}

.title-area{
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #334155;
padding-bottom:8px;
margin-bottom:15px;
}

.title{
font-size:17px;
color:var(--primary);
font-weight:bold;
}

.refresh-btn{
background:none;
border:none;
color:var(--status-dim);
cursor:pointer;
font-size:18px;
}

.item{
display:flex;
justify-content:space-between;
margin:8px 0;
font-size:14px;
}

.net-status{
font-size:9px;
margin-right:8px;
color:var(--status-dim);
}

.value{
font-weight:bold;
font-family:Consolas;
}

</style>
</head>

<body>

<h1>INVESTFLOW AI MARKET DASHBOARD</h1>

<div class="grid">

<div class="card">
<div class="title-area"><span class="title">2. 미국 시장</span></div>
<div class="item"><span>S&P500 (SPY)</span><span id="sp500" class="value">-</span></div>
<div class="item"><span>NASDAQ (QQQ)</span><span id="nasdaq" class="value">-</span></div>
<div class="item"><span>VIX</span><span id="vix" class="value">-</span></div>
<div class="item"><span>SOX</span><span id="sox" class="value">-</span></div>
</div>

<div class="card">
<div class="title-area"><span class="title">3. 미국 선물</span></div>
<div class="item"><span>S&P500 Fut</span><span id="spfuture" class="value">-</span></div>
<div class="item"><span>Nasdaq Fut</span><span id="nasfuture" class="value">-</span></div>
<div class="item"><span>Russell Fut</span><span id="rtyfuture" class="value">-</span></div>
</div>

<div class="card">
<div class="title-area"><span class="title">4. Crypto</span></div>
<div class="item"><span>Bitcoin</span><span id="btc" class="value">-</span></div>
<div class="item"><span>Ethereum</span><span id="eth" class="value">-</span></div>
<div class="item"><span>Solana</span><span id="sol" class="value">-</span></div>
</div>

<div class="card">
<div class="title-area"><span class="title">5. Commodities</span></div>
<div class="item"><span>Gold</span><span id="gold" class="value">-</span></div>
<div class="item"><span>Silver</span><span id="silver" class="value">-</span></div>
<div class="item"><span>Oil</span><span id="oil" class="value">-</span></div>
<div class="item"><span>DXY</span><span id="dxy" class="value">-</span></div>
</div>

<div class="card">
<div class="title-area"><span class="title">6. FX</span></div>
<div class="item"><span>USD/KRW</span><span id="uskrw" class="value">-</span></div>
<div class="item"><span>USD/JPY</span><span id="usjpy" class="value">-</span></div>
<div class="item"><span>EUR/USD</span><span id="eurusd" class="value">-</span></div>
</div>

<div class="card">
<div class="title-area"><span class="title">7. Market Liquidity</span></div>
<div class="item"><span>Fed Balance</span><span id="fedbal" class="value">-</span></div>
<div class="item"><span>Reverse Repo</span><span id="repo" class="value">-</span></div>
<div class="item"><span>M2</span><span id="m2" class="value">-</span></div>
<div class="item"><span>10Y</span><span id="us10y" class="value">-</span></div>
<div class="item"><span>2Y</span><span id="us2y" class="value">-</span></div>
</div>

</div>

<script>

const FMP="https://financialmodelingprep.com/api/v3/quote/"
const FMP_KEY="YOUR_FMP_KEY"

const FRED_KEY="5f6a050751729afcfabab471a6738a00"

function setValue(id,val){

const el=document.getElementById(id)

if(!val){
el.innerText="-"
return
}

el.innerText=Number(val).toLocaleString(undefined,{maximumFractionDigits:2})

}

async function fetchJSON(url){

try{

const r=await fetch(url)

if(!r.ok) throw new Error()

return await r.json()

}catch(e){

return null

}

}

async function fetchPrice(symbol){

let data=await fetchJSON(`${FMP}${symbol}?apikey=${FMP_KEY}`)

if(data && data[0] && data[0].price) return data[0].price

data=await fetchJSON(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`)

if(data && data.quoteResponse.result[0])
return data.quoteResponse.result[0].regularMarketPrice

return null

}

async function setPrice(symbol,id){

const p=await fetchPrice(symbol)

setValue(id,p)

}

async function loadMarkets(){

setPrice("SPY","sp500")
setPrice("QQQ","nasdaq")
setPrice("^VIX","vix")
setPrice("^SOX","sox")

setPrice("ES=F","spfuture")
setPrice("NQ=F","nasfuture")
setPrice("RTY=F","rtyfuture")

setPrice("GC=F","gold")
setPrice("SI=F","silver")
setPrice("CL=F","oil")
setPrice("DX-Y.NYB","dxy")

setPrice("KRW=X","uskrw")
setPrice("JPY=X","usjpy")
setPrice("EURUSD=X","eurusd")

}

async function loadCrypto(){

const data=await fetchJSON("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd")

if(!data) return

setValue("btc",data.bitcoin.usd)
setValue("eth",data.ethereum.usd)
setValue("sol",data.solana.usd)

}

async function loadFRED(series,id){

const data=await fetchJSON(`https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${FRED_KEY}&file_type=json`)

if(!data) return

const last=data.observations[data.observations.length-1]

setValue(id,last.value)

}

async function loadLiquidity(){

loadFRED("WALCL","fedbal")
loadFRED("RRPONTSYD","repo")
loadFRED("M2SL","m2")
loadFRED("DGS10","us10y")
loadFRED("DGS2","us2y")

}

function loadAll(){

loadMarkets()
loadCrypto()
loadLiquidity()

}

loadAll()

setInterval(loadAll,60000)

</script>

</body>
</html>
