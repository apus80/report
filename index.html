<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Global Macro Dashboard</title>

<style>

body{
background:#081423;
font-family:Arial;
color:white;
margin:0;
padding:30px;
}

h1{
text-align:center;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#12263f;
border-radius:12px;
padding:20px;
}

.card h2{
margin-top:0;
font-size:18px;
color:#3db7ff;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.value{
font-weight:bold;
}

</style>
</head>

<body>

<h1>Global Macro Dashboard</h1>

<div class="grid">

<div class="card">
<h2>한국 시장</h2>
<div class="row"><span>KOSPI</span><span id="kospi" class="value">-</span></div>
<div class="row"><span>KOSDAQ</span><span id="kosdaq" class="value">-</span></div>
</div>

<div class="card">
<h2>미국 시장</h2>
<div class="row"><span>S&P500</span><span id="spx" class="value">-</span></div>
<div class="row"><span>NASDAQ</span><span id="qqq" class="value">-</span></div>
<div class="row"><span>VIX</span><span id="vix" class="value">-</span></div>
<div class="row"><span>SOX</span><span id="sox" class="value">-</span></div>
</div>

<div class="card">
<h2>선물</h2>
<div class="row"><span>S&P500 Fut</span><span id="es" class="value">-</span></div>
<div class="row"><span>Nasdaq Fut</span><span id="nq" class="value">-</span></div>
<div class="row"><span>Russell Fut</span><span id="rt" class="value">-</span></div>
</div>

<div class="card">
<h2>Crypto</h2>
<div class="row"><span>Bitcoin</span><span id="btc" class="value">-</span></div>
<div class="row"><span>Ethereum</span><span id="eth" class="value">-</span></div>
<div class="row"><span>Solana</span><span id="sol" class="value">-</span></div>
</div>

<div class="card">
<h2>원자재</h2>
<div class="row"><span>Gold</span><span id="gold" class="value">-</span></div>
<div class="row"><span>Silver</span><span id="silver" class="value">-</span></div>
<div class="row"><span>Oil</span><span id="oil" class="value">-</span></div>
<div class="row"><span>DXY</span><span id="dxy" class="value">-</span></div>
</div>

<div class="card">
<h2>FX</h2>
<div class="row"><span>USD/KRW</span><span id="usdk" class="value">-</span></div>
<div class="row"><span>USD/JPY</span><span id="usdj" class="value">-</span></div>
<div class="row"><span>EUR/USD</span><span id="eur" class="value">-</span></div>
</div>

<div class="card">
<h2>Liquidity</h2>
<div class="row"><span>Fed Balance</span><span id="fed" class="value">-</span></div>
<div class="row"><span>Reverse Repo</span><span id="rrp" class="value">-</span></div>
<div class="row"><span>M2</span><span id="m2" class="value">-</span></div>
<div class="row"><span>10Y</span><span id="y10" class="value">-</span></div>
<div class="row"><span>2Y</span><span id="y2" class="value">-</span></div>
</div>

<div class="card">
<h2>Sentiment</h2>
<div class="row"><span>Fear & Greed</span><span id="fear" class="value">-</span></div>
</div>

</div>

<script>

const FRED_KEY="5f6a050751729afcfabab471a6738a00"

async function yahoo(id,symbol){

try{

let r=await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbol}`)
let d=await r.json()
let p=d.quoteResponse.result[0].regularMarketPrice

document.getElementById(id).innerText=p.toFixed(2)

}catch(e){}

}

async function fred(id,series){

try{

let r=await fetch(`https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=1`)
let d=await r.json()

let v=parseFloat(d.observations[0].value)

document.getElementById(id).innerText=v.toLocaleString()

}catch(e){}

}

async function crypto(){

try{

let r=await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd")
let d=await r.json()

btc.innerText=d.bitcoin.usd
eth.innerText=d.ethereum.usd
sol.innerText=d.solana.usd

}catch(e){}

}

async function fear(){

try{

let r=await fetch("https://api.alternative.me/fng/")
let d=await r.json()

fear.innerText=d.data[0].value

}catch(e){}

}

function load(){

yahoo("kospi","^KS11")
yahoo("kosdaq","^KQ11")

yahoo("spx","SPY")
yahoo("qqq","QQQ")
yahoo("vix","^VIX")
yahoo("sox","^SOX")

yahoo("es","ES=F")
yahoo("nq","NQ=F")
yahoo("rt","RTY=F")

yahoo("gold","GC=F")
yahoo("silver","SI=F")
yahoo("oil","CL=F")
yahoo("dxy","DX-Y.NYB")

yahoo("usdk","KRW=X")
yahoo("usdj","JPY=X")
yahoo("eur","EURUSD=X")

crypto()

fred("fed","WALCL")
fred("rrp","RRPONTSYD")
fred("m2","M2SL")
fred("y10","DGS10")
fred("y2","DGS2")

fear()

}

load()

setInterval(load,60000)

</script>

</body>
</html>
